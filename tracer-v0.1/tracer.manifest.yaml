# Standalone manifest for working inside tracer-v0.1/ directly.
# The repo-root manifest lives at ../tracer.manifest.yaml.

version: 1

mappings:
  - code:
      paths:
        - "*.js"
        - "adapters/**/*.js"
        - ".github/workflows/*.yml"
    docs:
      - path: "README.md"
        type: repo
      - path: "docs/architecture.md"
        type: repo
    strategy: suggest